<!DOCTYPE html>
<html>
<head>
  <title>Outlook SOC Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .high { border-left: 5px solid red; }
    .medium { border-left: 5px solid orange; }
    .low { border-left: 5px solid green; }
  </style>
</head>

<body>

  <h1>SOC Ticket Monitor</h1>

  <p>Actualización automática cada 5 segundos</p>

  <div id="tickets"></div>

  <script>
    async function loadTickets() {
      const res = await fetch("/api/tickets");
      const data = await res.json();

      const container = document.getElementById("tickets");
      container.innerHTML = "";

      data.forEach(t => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h3>${t.subject}</h3>
          <p>${t.preview}</p>
          <small>ID: ${t.id}</small>
        `;

        container.appendChild(div);
      });
    }

    // carga inicial
    loadTickets();

    //  auto-refresh (esto simula “tiempo real”)
    setInterval(loadTickets, 5000);
  </script>

</body>
</html>
